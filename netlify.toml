[build]
  base = "frontend"
  # base = "frontend" means Netlify only runs `npm install` inside frontend/
  # by default — the Netlify Functions live at the repo-root ../netlify/functions
  # and depend on packages declared in the repo-root package.json, which never
  # gets installed otherwise. `npm install --prefix ..` installs those first.
  command = "npm install --prefix .. && npm install && npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[functions]
  node_bundler = "esbuild"

# Frontend code calls fetch('/api/...') uniformly in both `netlify dev` and
# production; this maps it to the actual Netlify Functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# React Router (SPA) fallback — must come after the /api redirect above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html/sw.js/manifest.webmanifest keep the same URL across every deploy
# (unlike the hashed JS/CSS asset filenames, which are automatically
# cache-busted), so Netlify's edge CDN can keep serving a stale copy to a
# given edge node for a little while after a deploy unless told not to.
# no-cache still allows a conditional revalidation request (cheap, uses
# ETag) - it just forbids serving a cached copy without checking first, so
# new deploys are visible immediately instead of only after that edge node's
# cache happens to expire.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
