[build]
  base = "frontend"
  # base = "frontend" means Netlify only runs `npm install` inside frontend/
  # by default — the Netlify Functions live at the repo-root ../netlify/functions
  # and depend on packages declared in the repo-root package.json, which never
  # gets installed otherwise. `npm install --prefix ..` installs those first.
  command = "npm install --prefix .. && npm install && npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[functions]
  node_bundler = "esbuild"

# Frontend code calls fetch('/api/...') uniformly in both `netlify dev` and
# production; this maps it to the actual Netlify Functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# React Router (SPA) fallback — must come after the /api redirect above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
